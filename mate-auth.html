<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#794DC6" />
  <title>MATE — Talent Mates</title>

  <!--
    This file used to host the standalone Players auth page. It has been
    consolidated into mate-pro-auth.html, which now serves both Player and
    Agent roles via a single role toggle. We keep this file as a redirect
    so that:
      - existing Players bookmarks still land in the right place
      - any in-flight Google OAuth callback (which targeted this URL via
        redirectTo on the previous flow) lands here, gets the session,
        and is forwarded with intent=player preserved
    The original Players auth implementation lives in git history if a
    rollback is ever needed.
  -->

  <meta http-equiv="refresh" content="0;url=mate-pro-auth.html" />

  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; background: #794DC6; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .wrap { text-align: center; opacity: 0.7; font-size: 13px; letter-spacing: 0.06em; }
    a { color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    Redirecting to <a href="mate-pro-auth.html">mate-pro-auth.html</a>…
  </div>
  <script>
    // Forward to consolidated auth page, preserving any OAuth callback query
    // string (so Supabase auth state hand-off completes correctly) and
    // marking intent=player so init() on the destination routes correctly
    // when no agent or player row exists yet.
    try { localStorage.setItem('mate_intent', 'player'); } catch (_) {}
    const qs = window.location.search || '';
    const hash = window.location.hash || '';
    window.location.replace('mate-pro-auth.html' + qs + hash);
  </script>
</body>
</html>
