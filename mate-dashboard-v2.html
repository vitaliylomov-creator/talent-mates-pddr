<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MATE AI — Your personal football intelligence agent" />
  <title>MATE AI — Talent Mates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple:        #794DC6;
      --purple-dk:     #6b42b5;
      --purple-lt:     #7a50cc;
      --white:         #ffffff;
      --ink:           #1a0f2e;
      --border:        rgba(255,255,255,0.10);
      --border-mid:    rgba(255,255,255,0.20);
      --border-strong: rgba(255,255,255,0.35);
      --t1: #ffffff;
      --t2: rgba(255,255,255,0.82);
      --t3: rgba(255,255,255,0.55);
      --t4: rgba(255,255,255,0.35);
      --font-d: 'DM Serif Display', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-b);
      background: var(--purple);
      color: var(--t1);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: rgba(107,66,181,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .topbar-brand {
      font-family: var(--font-b);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .topbar-brand span { color: var(--t3); font-weight: 400; }

    /* ── PLAYER STATS BAR ── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 24px;
      background: rgba(0,0,0,0.12);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }
    .stat-item {
      display: flex;
      flex-direction: column;
      padding: 8px 16px;
      border-right: 0.5px solid var(--border);
      min-width: fit-content;
    }
    .stat-item:first-child { padding-left: 0; }
    .stat-item:last-child { border-right: none; }
    .stat-label {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--t4);
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
      white-space: nowrap;
    }
    .stat-value.urgent { color: #ff9898; }
    .stat-value.loading {
      background: var(--border);
      border-radius: 4px;
      width: 80px;
      height: 12px;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ── AGENT SELECTOR ── */
    .agent-selector {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      background: rgba(0,0,0,0.08);
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .agent-selector::-webkit-scrollbar { display: none; }
    .agent-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--t3);
      font-family: var(--font-b);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .agent-pill:hover {
      background: rgba(255,255,255,0.08);
      color: var(--t1);
      border-color: var(--border-strong);
    }
    .agent-pill.active {
      background: rgba(255,255,255,0.14);
      color: var(--t1);
      border-color: rgba(255,255,255,0.5);
    }
    .agent-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
    .agent-pill.active .agent-dot { background: #fff; }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Welcome state */
    .welcome-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 20px;
      animation: fadeUp 0.6s var(--ease) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .welcome-icon {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.10);
      border: 0.5px solid var(--border-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .welcome-title {
      font-family: var(--font-d);
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
      color: var(--t1);
    }
    .welcome-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--t3);
      max-width: 280px;
      line-height: 1.6;
    }

    /* Messages */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.4s var(--ease) both;
      max-width: 88%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .msg-meta {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--t4);
      text-transform: uppercase;
      padding: 0 4px;
    }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.65;
      color: var(--t2);
    }
    .msg.user .msg-bubble {
      background: rgba(255,255,255,0.07);
      border-radius: 14px 14px 4px 14px;
      border: 0.5px solid var(--border-mid);
      color: var(--t1);
    }
    .msg.assistant .msg-bubble {
      background: var(--purple-dk);
      border-radius: 4px 14px 14px 14px;
      border: 0.5px solid var(--border);
    }

    /* Markdown-style formatting inside MATE responses */
    .msg.assistant .msg-bubble strong { color: var(--t1); font-weight: 500; }
    .msg.assistant .msg-bubble em { color: rgba(255,255,255,0.6); font-style: italic; }
    .msg.assistant .msg-bubble p { margin-bottom: 10px; }
    .msg.assistant .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.assistant .msg-bubble ol,
    .msg.assistant .msg-bubble ul { padding-left: 18px; margin-bottom: 10px; }
    .msg.assistant .msg-bubble li { margin-bottom: 5px; line-height: 1.55; }
    .msg.assistant .msg-bubble h3 {
      font-family: var(--font-b);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin: 14px 0 6px;
    }
    .msg.assistant .msg-bubble h3:first-child { margin-top: 0; }

    /* PDF attachment indicator */
    .pdf-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border-mid);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--t3);
      margin-bottom: 6px;
    }
    .pdf-icon { font-size: 16px; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--purple-dk);
      border: 0.5px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      align-self: flex-start;
    }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: typing-bounce 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── QUICK ACTIONS ── */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 24px 0;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .quick-actions::-webkit-scrollbar { display: none; }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 100px;
      border: 0.5px solid var(--border-mid);
      background: transparent;
      color: var(--t3);
      font-family: var(--font-b);
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .quick-action:hover {
      background: rgba(255,255,255,0.08);
      color: var(--t1);
      border-color: var(--border-strong);
    }
    .quick-action:active { transform: scale(0.97); }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 12px 24px 20px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border-mid);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.09);
    }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-b);
      font-size: 14px;
      font-weight: 300;
      color: var(--t1);
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
      min-height: 22px;
    }
    .chat-input::placeholder { color: var(--t4); }

    /* Upload PDF button */
    .pdf-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--t4);
      transition: color 0.2s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .pdf-btn:hover { color: var(--t2); background: rgba(255,255,255,0.08); }
    .pdf-btn.has-pdf { color: #fff; }
    #pdfFileInput { display: none; }

    /* Send button */
    .send-btn {
      background: #ffffff;
      border: none;
      border-radius: 10px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.15s;
    }
    .send-btn:hover { opacity: 0.88; transform: scale(1.04); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .send-btn svg { stroke: var(--purple); }

    /* PDF attached pill */
    .pdf-attached {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.08);
      border: 0.5px solid var(--border-mid);
      border-radius: 100px;
      font-size: 11px;
      color: var(--t2);
      align-self: flex-start;
    }
    .pdf-attached.visible { display: flex; }
    .pdf-remove {
      background: none; border: none;
      color: var(--t4); cursor: pointer;
      font-size: 14px; padding: 0 2px;
      line-height: 1;
    }
    .pdf-remove:hover { color: var(--t1); }

    /* Real-time data badge */
    .rt-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border);
      border-radius: 100px;
      padding: 3px 8px;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }
    .rt-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #6dffb3;
    }

    /* Logout link */
    .logout-btn {
      background: none; border: none;
      font-family: var(--font-b);
      font-size: 11px;
      color: var(--t4);
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .logout-btn:hover { color: var(--t2); }

    @media (max-width: 400px) {
      .topbar { padding: 12px 16px; }
      .stats-bar { padding: 0 16px; }
      .agent-selector { padding: 10px 16px; }
      .chat-area { padding: 16px 16px; }
      .input-area { padding: 10px 16px 18px; }
      .quick-actions { padding: 8px 16px 0; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">MATE <span>AI</span></div>
  <button class="logout-btn" onclick="handleLogout()">Sign out</button>
</div>

<!-- PLAYER STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-item">
    <div class="stat-label">Player</div>
    <div class="stat-value loading" id="statName"></div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Club</div>
    <div class="stat-value loading" id="statClub"></div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Position</div>
    <div class="stat-value loading" id="statPosition"></div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Contract</div>
    <div class="stat-value loading" id="statContract"></div>
  </div>
  <div class="stat-item">
    <div class="stat-label">Agent</div>
    <div class="stat-value loading" id="statAgent"></div>
  </div>
</div>

<!-- AGENT SELECTOR -->
<div class="agent-selector">
  <button class="agent-pill active" data-agent="auto" onclick="selectAgent(this, 'auto')">
    <div class="agent-dot"></div>
    Auto
  </button>
  <button class="agent-pill" data-agent="legal" onclick="selectAgent(this, 'legal')">
    <div class="agent-dot"></div>
    ⚖️ Legal
  </button>
  <button class="agent-pill" data-agent="coach" onclick="selectAgent(this, 'coach')">
    <div class="agent-dot"></div>
    🏋️ Coach
  </button>
  <button class="agent-pill" data-agent="analyst" onclick="selectAgent(this, 'analyst')">
    <div class="agent-dot"></div>
    📊 Analyst
  </button>
  <button class="agent-pill" data-agent="concierge" onclick="selectAgent(this, 'concierge')">
    <div class="agent-dot"></div>
    🏠 Concierge
  </button>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome-state" id="welcomeState">
    <div class="welcome-icon">⚽</div>
    <div class="welcome-title">Good to see you</div>
    <div class="welcome-sub" id="welcomeSub">Your personal football intelligence agent is ready.</div>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="quick-actions" id="quickActions">
  <button class="quick-action" onclick="sendQuick('Review my contract situation')">⚖️ Contract review</button>
  <button class="quick-action" onclick="sendQuick('Design my training plan for this week')">🏋️ Training plan</button>
  <button class="quick-action" onclick="sendQuick('What is my current market value and which clubs should I target?')">📊 Market value</button>
  <button class="quick-action" onclick="sendQuick('What is the weather like today and when is the next train from Slough to London?')">🏠 Daily briefing</button>
</div>

<!-- INPUT AREA -->
<div class="input-area">
  <!-- PDF attached indicator -->
  <div class="pdf-attached" id="pdfAttached">
    <span>📄</span>
    <span id="pdfAttachedName">contract.pdf</span>
    <button class="pdf-remove" onclick="removePDF()">✕</button>
  </div>

  <div class="input-row">
    <!-- PDF upload button -->
    <button class="pdf-btn" id="pdfBtn" onclick="document.getElementById('pdfFileInput').click()" title="Upload contract PDF">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <line x1="9" y1="15" x2="15" y2="15"/>
      </svg>
    </button>
    <input type="file" id="pdfFileInput" accept=".pdf" onchange="handlePDFSelect(event)" />

    <textarea
      class="chat-input"
      id="chatInput"
      placeholder="Ask MATE anything…"
      rows="1"
      onkeydown="handleKeyDown(event)"
      oninput="autoResize(this)"
    ></textarea>

    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // CONFIG
  // ─────────────────────────────────────────────
  const EDGE_FUNCTION_URL = 'https://zlkzjeaojpxzccpovygk.supabase.co/functions/v1/mate-chat';
  const SUPABASE_URL = 'https://zlkzjeaojpxzccpovygk.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // Replace with your actual anon key

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  let player = null;
  let sessionId = crypto.randomUUID();
  let selectedAgent = 'auto';
  let isLoading = false;
  let pdfBase64 = null;
  let pdfName = null;
  let hasStartedChat = false;

  // ─────────────────────────────────────────────
  // INIT: Load player from Supabase Auth
  // ─────────────────────────────────────────────
  async function init() {
    // Get session from localStorage (set by auth page)
    const sessionData = localStorage.getItem('mate_session');
    if (!sessionData) {
      window.location.href = 'mate-auth.html';
      return;
    }

    try {
      const session = JSON.parse(sessionData);

      // Fetch player profile
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/players?auth_user_id=eq.${session.user.id}&select=*`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/json',
          }
        }
      );

      if (!res.ok) throw new Error('Failed to fetch player');
      const players = await res.json();

      if (!players || players.length === 0) {
        window.location.href = 'mate-onboarding.html';
        return;
      }

      player = players[0];
      populateStats();
      setWelcomeMessage();

    } catch (err) {
      console.error('Init error:', err);
      window.location.href = 'mate-auth.html';
    }
  }

  // ─────────────────────────────────────────────
  // POPULATE STATS BAR
  // ─────────────────────────────────────────────
  function populateStats() {
    if (!player) return;

    // Remove loading shimmer
    document.querySelectorAll('.stat-value.loading').forEach(el => {
      el.classList.remove('loading');
    });

    document.getElementById('statName').textContent =
      player.full_name?.split(' ')[0] ?? '—';
    document.getElementById('statClub').textContent =
      player.current_club ?? '—';
    document.getElementById('statPosition').textContent =
      player.position_primary ?? '—';

    // Contract expiry — flag if within 6 months
    const contractEl = document.getElementById('statContract');
    if (player.contract_expires) {
      const expiry = new Date(player.contract_expires);
      const now = new Date();
      const monthsLeft = (expiry - now) / (1000 * 60 * 60 * 24 * 30);
      contractEl.textContent = player.contract_expires;
      if (monthsLeft < 6) contractEl.classList.add('urgent');
    } else {
      contractEl.textContent = '—';
    }

    document.getElementById('statAgent').textContent =
      player.agent_name ?? '—';
  }

  // ─────────────────────────────────────────────
  // WELCOME MESSAGE
  // ─────────────────────────────────────────────
  function setWelcomeMessage() {
    if (!player) return;
    const firstName = player.full_name?.split(' ')[0] ?? 'there';
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';

    document.querySelector('.welcome-title').textContent = `${greeting}, ${firstName}`;
    document.getElementById('welcomeSub').textContent =
      'Your personal football intelligence agent. Ask about your contract, training, market value, or anything you need.';
  }

  // ─────────────────────────────────────────────
  // AGENT SELECTOR
  // ─────────────────────────────────────────────
  function selectAgent(el, agent) {
    document.querySelectorAll('.agent-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedAgent = agent;
  }

  // ─────────────────────────────────────────────
  // PDF HANDLING
  // ─────────────────────────────────────────────
  function handlePDFSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
      alert('PDF must be under 5MB');
      return;
    }

    pdfName = file.name;

    const reader = new FileReader();
    reader.onload = (e) => {
      // Extract base64 data (remove data:application/pdf;base64, prefix)
      pdfBase64 = e.target.result.split(',')[1];

      // Show attached indicator
      document.getElementById('pdfAttachedName').textContent = file.name;
      document.getElementById('pdfAttached').classList.add('visible');
      document.getElementById('pdfBtn').classList.add('has-pdf');

      // Auto-select Legal agent for PDF
      const legalPill = document.querySelector('[data-agent="legal"]');
      selectAgent(legalPill, 'legal');

      // Set placeholder
      document.getElementById('chatInput').placeholder =
        'Ask MATE to analyse this contract…';
    };
    reader.readAsDataURL(file);
  }

  function removePDF() {
    pdfBase64 = null;
    pdfName = null;
    document.getElementById('pdfAttached').classList.remove('visible');
    document.getElementById('pdfBtn').classList.remove('has-pdf');
    document.getElementById('pdfFileInput').value = '';
    document.getElementById('chatInput').placeholder = 'Ask MATE anything…';
  }

  // ─────────────────────────────────────────────
  // SEND MESSAGE
  // ─────────────────────────────────────────────
  function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();

    if ((!message && !pdfBase64) || isLoading || !player) return;

    isLoading = true;
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    // Hide welcome state on first message
    if (!hasStartedChat) {
      document.getElementById('welcomeState').style.display = 'none';
      document.getElementById('quickActions').style.display = 'none';
      hasStartedChat = true;
    }

    const displayMessage = message || `Analyse this contract: ${pdfName}`;

    // Show user message
    appendUserMessage(displayMessage);

    // Clear PDF after sending
    const currentPdfBase64 = pdfBase64;
    const currentPdfName = pdfName;
    if (pdfBase64) removePDF();

    // Show typing indicator
    const typingEl = appendTyping();

    try {
      const payload = {
        message: displayMessage,
        player_id: player.id,
        session_id: sessionId,
        agent_type: selectedAgent === 'auto' ? null : selectedAgent,
      };

      if (currentPdfBase64) {
        payload.pdf_base64 = currentPdfBase64;
        payload.pdf_name = currentPdfName;
      }

      const res = await fetch(EDGE_FUNCTION_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await res.json();
      typingEl.remove();

      if (data.error) {
        appendMATEMessage('I encountered an issue. Please try again.', null, false);
      } else {
        appendMATEMessage(
          data.response,
          data.agent_type,
          data.had_real_time_data
        );
      }
    } catch (err) {
      typingEl.remove();
      appendMATEMessage('Connection issue. Please check your internet and try again.', null, false);
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // ─────────────────────────────────────────────
  // RENDER MESSAGES
  // ─────────────────────────────────────────────
  function appendUserMessage(text) {
    const chatArea = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `<div class="msg-bubble">${escapeHTML(text)}</div>`;
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function appendMATEMessage(text, agentType, hadRealTimeData) {
    const chatArea = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.className = 'msg assistant';

    const agentLabels = {
      legal: '⚖️ Legal Advisor',
      coach: '🏋️ Performance Coach',
      analyst: '📊 Transfer Analyst',
      concierge: '🏠 Concierge',
    };
    const agentLabel = agentLabels[agentType] ?? '✦ MATE';

    const rtBadge = hadRealTimeData
      ? `<div class="rt-badge"><div class="rt-dot"></div>Live data</div>`
      : '';

    el.innerHTML = `
      <div class="msg-meta">${agentLabel}</div>
      <div class="msg-bubble">${formatMATEResponse(text)}</div>
      ${rtBadge}
    `;
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function appendTyping() {
    const chatArea = document.getElementById('chatArea');
    const el = document.createElement('div');
    el.className = 'typing-indicator';
    el.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    `;
    chatArea.appendChild(el);
    scrollToBottom();
    return el;
  }

  // ─────────────────────────────────────────────
  // TEXT FORMATTING
  // ─────────────────────────────────────────────
  function formatMATEResponse(text) {
    // Convert markdown-lite to HTML for premium rendering
    return text
      // Headers: ### Header
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      // Bold: **text**
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic: *text*
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Numbered lists
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
      // Bullet lists
      .replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>')
      // Wrap consecutive <li> in <ol>/<ul>
      .replace(/(<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`)
      // Paragraphs (double newline)
      .replace(/\n\n/g, '</p><p>')
      // Single newlines
      .replace(/\n/g, '<br/>')
      // Wrap in paragraph
      .replace(/^(.+)$/, '<p>$1</p>')
      .replace(/<p><\/p>/g, '');
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scrollToBottom() {
    const chatArea = document.getElementById('chatArea');
    setTimeout(() => {
      chatArea.scrollTop = chatArea.scrollHeight;
    }, 50);
  }

  // ─────────────────────────────────────────────
  // LOGOUT
  // ─────────────────────────────────────────────
  function handleLogout() {
    localStorage.removeItem('mate_session');
    window.location.href = 'mate-auth.html';
  }

  // ─────────────────────────────────────────────
  // START
  // ─────────────────────────────────────────────
  init();
</script>
</body>
