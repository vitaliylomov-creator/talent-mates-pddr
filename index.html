<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=https://talent-mates.com/" />
  <meta name="robots" content="noindex, follow" />
  <meta name="description" content="Redirecting to talent-mates.com — the Talent Mates main site." />
  <link rel="canonical" href="https://talent-mates.com/" />
  <title>Talent Mates — Redirecting…</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0d0617;
      color: #fff;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      gap: 28px;
    }
    .brand {
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }
    .brand strong { color: #fff; font-weight: 500; }
    .headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      max-width: 18ch;
    }
    .headline em {
      font-style: italic;
      color: rgba(255, 255, 255, 0.50);
    }
    .sub {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.70);
      max-width: 460px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #794DC6;
      padding: 14px 28px;
      border-radius: 100px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }
    .cta:hover  { transform: scale(1.02); opacity: 0.92; }
    .cta:active { transform: scale(0.99); }
    .cta svg { width: 14px; height: 14px; }
    .meta {
      margin-top: 8px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.32);
    }
  </style>

  <script>
    // JS redirect — fires before meta-refresh on most browsers.
    // location.replace so this URL doesn't end up in browser history.
    location.replace('https://talent-mates.com/');
  </script>
</head>
<body>
  <div class="brand"><strong>Talent</strong> Mates</div>
  <h1 class="headline">Redirecting to <em>talent-mates.com</em></h1>
  <p class="sub">
    This subdomain hosts the live Talent Mates apps. The main site lives at talent-mates.com.
    You&rsquo;ll be there in a moment — if not, use the link below.
  </p>
  <a class="cta" href="https://talent-mates.com/">
    Continue to Talent Mates
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden>
      <path d="M5 12h14M13 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </a>
  <div class="meta">London · 2026</div>
</body>
</html>
